# 本地开发：仅 PostgreSQL。若需 Postgres + 后端 + 前端一并 Docker 启动，请用仓库根目录 docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    container_name: monitor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
